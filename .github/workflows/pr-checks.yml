# .github/workflows/pr-checks.yml
name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Python PyQt6 app checks
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Install system dependencies for OpenCV and Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dri libglib2.0-0 libxrandr2 libxss1 libxcursor1 libxcomposite1 libxi6 libxtst6 libgstreamer1.0-0 libgstreamer-plugins-base1.0-0 qt6-base-dev
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Set up Python
        run: uv python install 3.9
      
      - name: Install Python dependencies
        run: uv sync --group dev
      
      - name: Run ruff check
        run: uv run ruff check .
      
      - name: Run ruff format check
        run: uv run ruff format --check .
      
      - name: Check if tests exist and run them
        run: |
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            echo "Found tests, running pytest..."
            uv run pytest -v
          else
            echo "No tests found, skipping pytest"
          fi
        env:
          # Use mock camera for CI
          PYTEST_MOCK_CAMERA: "1"
          # Use virtual display for Qt tests
          QT_QPA_PLATFORM: "offscreen"
      
      - name: Test PyQt6 imports and basic functionality
        run: |
          echo "Testing PyQt6 and MediaPipe imports..."
          uv run python -c "
          import sys
          try:
              import PyQt6.QtWidgets
              import cv2
              import mediapipe as mp
              import numpy as np
              from backend.detection.config import Config
              from backend.detection.multi_region_detector import MultiRegionDetector
              from ui.status_overlay import StatusOverlay
              from ui.settings_panel import SettingsPanel
              print('✅ All imports successful')
              print('✅ PyQt6 app components can be imported')
          except Exception as e:
              print(f'❌ Import failed: {e}')
              sys.exit(1)
          "
      
      - name: Validate conventional commits
        uses: wagoid/commitlint-github-action@v5
        if: github.event_name == 'pull_request'
        with:
          commitDepth: 1