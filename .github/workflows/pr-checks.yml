# .github/workflows/pr-checks.yml
name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Python PyQt6 app checks
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Install system dependencies for OpenCV and Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dri libglib2.0-0 libxrandr2 libxss1 libxcursor1 libxcomposite1 libxi6 libxtst6 libgstreamer1.0-0 libgstreamer-plugins-base1.0-0 qt6-base-dev
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Set up Python
        run: uv python install 3.9
      
      - name: Install Python dependencies
        run: uv sync --group dev
      
      - name: Run ruff check
        run: uv run ruff check .
      
      - name: Run ruff format check
        run: uv run ruff format --check .
      
      - name: Run Python tests
        run: uv run pytest -v
        env:
          # Use mock camera for CI
          PYTEST_MOCK_CAMERA: "1"
          # Use virtual display for Qt tests
          QT_QPA_PLATFORM: "offscreen"
      
      - name: Test PyQt6 app startup (headless mode)
        run: |
          timeout 10s uv run python main.py --test-mode || true
          echo "PyQt6 app startup test completed"
      
      - name: Validate conventional commits
        uses: wagoid/commitlint-github-action@v5
        if: github.event_name == 'pull_request'
        with:
          commitDepth: 1