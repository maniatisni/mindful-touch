# .github/workflows/tag-release.yml
name: Build and Release PyQt6 App

on:
  push:
    tags:
      - 'v*'         # e.g. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv for Python
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Set up Python
        run: uv python install 3.9

      - name: Install Python dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv add pyinstaller

      - name: Build PyQt6 standalone app
        run: |
          uv run pyinstaller mindful-touch.spec --clean --noconfirm
          echo "✅ PyQt6 standalone app built successfully"
          # Verify app was created
          ls -la "dist/Mindful Touch.app"
          echo "App contents:"
          ls -la "dist/Mindful Touch.app/Contents/MacOS/"

      - name: Create DMG for distribution with drag-to-Applications
        run: |
          # Create temporary directory for DMG contents
          mkdir -p dmg-temp
          cp -R "dist/Mindful Touch.app" dmg-temp/
          
          # Create symbolic link to Applications folder
          ln -s /Applications dmg-temp/Applications
          
          # Create DMG with proper layout
          hdiutil create -volname "Mindful Touch" \
            -srcfolder dmg-temp \
            -ov -format UDZO \
            "dist/Mindful-Touch-${{ github.ref_name }}.dmg"
          
          # Clean up temp directory
          rm -rf dmg-temp
          
          echo "✅ DMG with drag-to-Applications created successfully"
          # Verify DMG size and info
          ls -lh "dist/Mindful-Touch-${{ github.ref_name }}.dmg"

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Mindful-Touch-${{ github.ref_name }}.dmg
          draft: false
          prerelease: false
